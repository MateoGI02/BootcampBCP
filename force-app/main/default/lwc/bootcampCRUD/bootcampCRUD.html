<template>
    <lightning-card title="Lista de Requests" icon-name="custom:custom18">
        <div class="slds-m-around_medium">
            
            <div class="slds-m-bottom_medium">
                <lightning-button label="Create" variant="brand" onclick={openModal}></lightning-button>
            </div>

            <template if:true={data}>
                <lightning-datatable
                    key-field="Id"
                    data={data}
                    columns={columns}
                    hide-checkbox-column="true"
                    onsave={handleSave}
                    draft-values={draftValues}
                    onrowaction={handleRowAction}> </lightning-datatable>
            </template>
        </div>
    </lightning-card>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_small">
            <div class="slds-modal__container">
                
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">New Request</h2>
                </header>
                
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form object-api-name="Request__c" onsubmit={handleSubmit} onsuccess={handleSuccess}>
                        <lightning-messages></lightning-messages>
                        
                        <lightning-input-field field-name="Subject__c" required></lightning-input-field>
                        <lightning-input-field field-name="Status__c" value="New" required></lightning-input-field>
                        <lightning-input-field field-name="Priority__c" required></lightning-input-field>
                        <lightning-input-field field-name="Due_Date__c"></lightning-input-field>
                        <lightning-input-field field-name="Description__c"></lightning-input-field>
                        <lightning-input-field field-name="Requester__c" value={currentUserId} required></lightning-input-field>
                        
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button class="slds-m-right_small" label="Cancel" onclick={closeModal}></lightning-button>
                            <lightning-button label="Save" variant="brand" type="submit"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
