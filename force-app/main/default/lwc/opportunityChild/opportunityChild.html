<template>
    <lightning-card title="Resultados de Oportunidades" icon-name="standard:opportunity">
        <div class="slds-m-around_medium">
            <template if:true={opportunities}>
                <lightning-datatable
                    key-field="Id"
                    data={opportunities}
                    columns={columns}
                    max-row-selection="1"
                    onrowselection={handleRowSelection}
                    onsave={handleSave}
                    draft-values={draftValues}>
                </lightning-datatable>
            </template>
            
            <template if:true={error}>
                <p class="slds-text-color_error">Error al cargar datos: {error}</p>
            </template>
            
            <template if:false={selectedStage}>
                <p class="slds-text-color_weak">Por favor, seleccione un estado en el panel superior.</p>
            </template>
        </div>
    </lightning-card>
</template>
