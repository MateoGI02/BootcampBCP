<template>
    <lightning-card title="Buscador de Oportunidades" icon-name="standard:search">
        <div class="slds-m-around_medium">
            <lightning-combobox
                name="stageSelect"
                label="Seleccione un Estado de Oportunidad"
                value={selectedStage}
                options={stageOptions}
                onchange={handleStageChange}>
            </lightning-combobox>

            <template if:true={selectedOppName}>
                <div class="slds-m-top_medium slds-box slds-theme_alert-texture slds-theme_info">
                    <p>Has seleccionado la oportunidad: <strong>{selectedOppName}</strong></p>
                </div>
            </template>
        </div>

        <div class="slds-m-around_medium">
            <c-opportunity-child
                selected-stage={selectedStage}
                onrowselected={handleRowSelected}>
            </c-opportunity-child>
        </div>
    </lightning-card>
</template>
